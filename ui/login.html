<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArgonOS — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: {
              DEFAULT: '#4f46e5',
              hover:   '#4338ca',
              light:   '#eef2ff',
            },
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
</head>

<body class="bg-zinc-50 text-zinc-900 font-sans antialiased min-h-screen flex flex-col items-center justify-center px-4">

  <!-- ── Card ────────────────────────────────────────────────────── -->
  <div class="w-full max-w-sm">

    <!-- Logo + wordmark -->
    <div class="flex flex-col items-center mb-8">
      <div class="flex items-center justify-center w-12 h-12 rounded-2xl bg-accent text-white text-sm font-bold select-none tracking-tight shadow-lg mb-4">
        Ar
      </div>
      <h1 class="text-lg font-semibold text-zinc-900">ArgonOS</h1>
      <p class="text-sm text-zinc-400 mt-0.5">UX Operations Platform</p>
    </div>

    <!-- Login card -->
    <div class="bg-white border border-zinc-200 rounded-2xl shadow-sm px-8 py-8">

      <h2 class="text-sm font-semibold text-zinc-800 mb-1">Sign in to continue</h2>
      <p class="text-xs text-zinc-400 mb-6 leading-relaxed">Enter the team password to access ArgonOS.</p>

      <!-- Form -->
      <form id="login-form" novalidate>

        <div class="mb-4">
          <label for="password" class="block text-xs font-semibold text-zinc-700 mb-1.5">
            Password
          </label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            placeholder="Team password"
            required
            class="w-full px-3 py-2.5 text-sm bg-zinc-50 border border-zinc-200 rounded-lg text-zinc-900 placeholder:text-zinc-400 focus:outline-none focus:ring-2 focus:ring-accent focus:bg-white transition"
          >
        </div>

        <!-- Error message (hidden by default) -->
        <div id="error-msg" class="hidden mb-4 flex items-center gap-2 px-3 py-2.5 bg-red-50 border border-red-200 rounded-lg" role="alert">
          <svg class="w-4 h-4 text-red-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
          </svg>
          <p class="text-xs text-red-700 font-medium">Incorrect password. Try again.</p>
        </div>

        <button
          type="submit"
          id="submit-btn"
          class="w-full py-2.5 px-4 text-sm font-semibold text-white bg-accent hover:bg-accent-hover rounded-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
        >
          Sign in
        </button>

      </form>

    </div>

    <p class="text-center text-[11px] text-zinc-400 mt-6">
      ConnectWise UX · Internal tool
    </p>

  </div>

  <script>
    /**
     * SHA-256 hash of the team password.
     *
     * To change the password:
     * 1. Open a browser console and run:
     *      crypto.subtle.digest('SHA-256', new TextEncoder().encode('YOUR_NEW_PASSWORD'))
     *        .then(b => console.log([...new Uint8Array(b)].map(x => x.toString(16).padStart(2,'0')).join('')))
     * 2. Replace the STORED_HASH value below with the output.
     *
     * Default password: argonos2026
     */
    var STORED_HASH = 'b6652814d554924b6d57dfa07702a086d2ecd594d9dbc8fd3625a3579956056d';
    var SESSION_KEY = 'argonos_auth';

    // If already authenticated, skip the login screen
    if (sessionStorage.getItem(SESSION_KEY)) {
      window.location.replace('index.html');
    }

    async function sha256(message) {
      var buffer = new TextEncoder().encode(message);
      var hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
      return Array.from(new Uint8Array(hashBuffer))
        .map(function (b) { return b.toString(16).padStart(2, '0'); })
        .join('');
    }

    var form      = document.getElementById('login-form');
    var input     = document.getElementById('password');
    var errorMsg  = document.getElementById('error-msg');
    var submitBtn = document.getElementById('submit-btn');

    function showError() {
      errorMsg.classList.remove('hidden');
      input.classList.add('ring-2', 'ring-red-400', 'border-transparent');
      input.focus();
    }

    function hideError() {
      errorMsg.classList.add('hidden');
      input.classList.remove('ring-2', 'ring-red-400', 'border-transparent');
    }

    input.addEventListener('input', hideError);

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      hideError();

      var password = input.value;
      if (!password) {
        showError();
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = `
        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        Verifying…
      `;

      try {
        var hash = await sha256(password);

        if (hash === STORED_HASH) {
          sessionStorage.setItem(SESSION_KEY, '1');
          var redirect = sessionStorage.getItem('argonos_redirect');
          sessionStorage.removeItem('argonos_redirect');
          // Only redirect to a saved page if it is not the login page itself
          if (redirect && !redirect.includes('login.html')) {
            window.location.replace(redirect);
          } else {
            window.location.replace('index.html');
          }
        } else {
          showError();
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign in';
        }
      } catch (err) {
        console.error('Auth error:', err);
        showError();
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in';
      }
    });
  </script>

</body>
</html>
